name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
    
    - name: Setup Android environment
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '9477386'
    
    - name: Install Android NDK
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-33"
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.0"
    
    - name: Configure environment variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
    
    - name: Initialize Android project
      run: npx @tauri-apps/cli android init
    
    - name: Build Android APK
      run: npx @tauri-apps/cli android build
    
    - name: List generated files
      run: |
        echo "Checking for APK files..."
        find src-tauri/target -name "*.apk" -type f | while read file; do
          echo "Found APK: $file"
          ls -la "$file"
        done
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: yield-showcase-apk
        path: src-tauri/target/android/apk/release/*.apk
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: src-tauri/target/android/apk/release/*.apk
        generate_release_notes: true